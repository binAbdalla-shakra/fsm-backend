version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: fsm-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fsm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: fsm-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

volumes:
  pgdata:
  redisdata:
